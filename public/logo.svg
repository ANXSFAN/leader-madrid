<svg width="200" height="48" viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hex-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc"/>
      <stop offset="100%" style="stop-color:#003366"/>
    </linearGradient>
    <linearGradient id="glow-line" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <g transform="translate(4, 3)">
    <!-- Hexagon outline -->
    <polygon points="21,2 39,2 48,17 39,32 21,32 12,17" fill="none" stroke="url(#hex-stroke)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Inner 3D wireframe lines -->
    <line x1="12" y1="17" x2="30" y2="17" stroke="#0055aa" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="17" x2="39" y2="2" stroke="#0055aa" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="17" x2="39" y2="32" stroke="#0055aa" stroke-width="1.5" opacity="0.4"/>
    <!-- LED accent: small glowing arc + dot -->
    <path d="M25,9 Q30,5 35,9" fill="none" stroke="url(#glow-line)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="30" cy="11" r="2.5" fill="none" stroke="#facc15" stroke-width="1.5"/>
    <circle cx="30" cy="11" r="0.8" fill="#facc15"/>
  </g>
  <!-- Brand text -->
  <text x="62" y="27" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="#0a1628" letter-spacing="1">ZELURA</text>
  <!-- Tagline -->
  <text x="62" y="40" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" font-size="7.5" font-weight="600" fill="#94a3b8" letter-spacing="3.5">LIGHTING SYSTEMS</text>
</svg>
